name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "feat/**", "chore/**", "release/**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mrpackmaker/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mrpackmaker/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check and build
        run: npm run build

  offline-verification:
    name: Offline release verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r mrpackmaker/backend/requirements.txt
      - name: Verify release contracts
        run: python scripts/verify_release.py

  windows-launcher:
    name: Windows PowerShell launcher parse
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse launcher scripts with Windows PowerShell
        shell: powershell
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD 'mrpackmaker/scripts/start.ps1'),
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List | Out-String; throw 'start.ps1 contains PowerShell syntax errors' }
          if (-not (Select-String -Path 'mrpackmaker/start.bat' -Pattern 'scripts\\start.ps1')) { throw 'start.bat does not delegate to start.ps1' }
          Write-Host 'Windows launcher parse: PASS'
